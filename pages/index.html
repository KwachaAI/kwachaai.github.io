<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>KwachaAI Pages — Landing pages & Product news</title>
		<meta name="description" content="Explore KwachaAI landing pages, product updates, and FAQs. Your AI Desktop Workspace workspace for productivity." />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://kwachaai.github.io/pages/" />
		<meta property="og:title" content="KwachaAI Pages — News & Updates" />
		<meta property="og:description" content="Explore KwachaAI landing pages, product updates, and FAQs." />
		<meta property="og:image" content="https://kwachaai.github.io/assets/hero3.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://kwachaai.github.io/pages/" />
		<meta property="twitter:title" content="KwachaAI Pages — News & Updates" />
		<meta property="twitter:description" content="Explore KwachaAI landing pages, product updates, and FAQs." />
		<meta property="twitter:image" content="https://kwachaai.github.io/assets/hero3.png" />

		<style>
			:root {
				color-scheme: light;
				--bg: #f6f5f1;
				--surface: #ffffff;
				--text: #151515;
				--muted: #64605a;
				--border: rgba(21, 21, 21, 0.1);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
				color: var(--text);
				padding: 32px;
			}

			main {
				max-width: 800px;
				margin: 0 auto;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 24px;
				padding: 40px;
				box-shadow: 0 24px 80px rgba(21, 21, 21, 0.08);
			}

			h1 {
				margin: 0 0 12px;
				font-size: clamp(2rem, 4vw, 3rem);
			}

			p {
				margin: 0 0 18px;
				line-height: 1.65;
				color: var(--muted);
			}

			a {
				color: inherit;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>KwachaAI Pages</h1>
			<p>
				This section is reserved for standalone public pages such as landing pages,
				product pages, release notes, and FAQs.
			</p>
			<p>
				Go back to the <a href="../">website home</a>.
			</p>
		</main>
	</body>
</html>
