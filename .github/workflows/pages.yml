name: Deploy KwachaAI Site

on:
  push:
    branches: [main]
    paths:
      - index.html
      - README.md
      - assets/**
      - docs/**
      - pages/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -a --delete \
            --exclude '.git*' \
            --exclude '.github/' \
            --exclude 'dist/' \
            --exclude 'README.md' \
            ./ dist/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
